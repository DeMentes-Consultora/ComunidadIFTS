<app-auth-shell title="Recuperar contraseña" subtitle="Ingresá tu email para recibir un enlace de restablecimiento." cardWidth="520px">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" *ngIf="!enviado; else enviadoTpl">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" placeholder="tu.email@ejemplo.com" />
      <mat-icon matSuffix>mail</mat-icon>
      <mat-error *ngIf="form.get('email')?.hasError('required')">El email es obligatorio</mat-error>
      <mat-error *ngIf="form.get('email')?.hasError('email')">Ingresá un email válido</mat-error>
    </mat-form-field>

    <div *ngIf="error" class="status-message error">{{ error }}</div>

    <div class="actions">
      <a mat-button routerLink="/home">Volver</a>
      <button mat-raised-button color="primary" type="submit" [disabled]="cargando">
        {{ cargando ? 'Enviando...' : 'Enviar enlace' }}
      </button>
    </div>
  </form>

  <ng-template #enviadoTpl>
    <div class="status-message success">{{ mensaje }}</div>
    <div *ngIf="warning" class="status-message error">{{ warning }}</div>
    <div *ngIf="resetLink" class="status-message success">
      Enlace de prueba local:
      <a [href]="resetLink">{{ resetLink }}</a>
    </div>
    <div class="actions">
      <a mat-button routerLink="/home">Ir al inicio</a>
      <a mat-raised-button color="primary" routerLink="/home">Volver a ingresar</a>
    </div>
  </ng-template>
</app-auth-shell>
