<div class="auth-modal-header">
  <h2>{{ currentView === 'login' ? 'Inicio de sesion' : 'Crear cuenta' }}</h2>
  <button mat-icon-button type="button" (click)="cerrar()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div class="auth-modal-body">
  <app-formulario-login
    *ngIf="currentView === 'login'"
    (cancel)="cerrar()"
    (switchToRegister)="mostrarRegistro()"
    (loginSuccess)="onAuthSuccess($event)">
  </app-formulario-login>

  <app-formulario-registro
    *ngIf="currentView === 'register'"
    (cancel)="cerrar()"
    (switchToLogin)="mostrarLogin()"
    (registerSuccess)="onAuthSuccess($event)">
  </app-formulario-registro>
</div>

<div class="auth-modal-footer">
  <div class="auth-modal-legal-links">
    <a routerLink="/terminos-condiciones" target="_blank" rel="noopener">Términos y Condiciones</a>
    <a routerLink="/politica-privacidad" target="_blank" rel="noopener">Política de Privacidad</a>
  </div>
</div>
