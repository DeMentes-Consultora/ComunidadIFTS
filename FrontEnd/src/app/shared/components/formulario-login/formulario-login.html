<form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
  <button mat-stroked-button type="button" class="google-btn" [disabled]="cargando" (click)="onGoogleLogin()">
    Continuar con Google
  </button>

  <div class="divider">o ingresá con email y contraseña</div>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email" placeholder="tu.email@ejemplo.com" />
    <mat-icon matSuffix>mail</mat-icon>
    <mat-error *ngIf="form.get('email')?.hasError('required')">El email es obligatorio</mat-error>
    <mat-error *ngIf="form.get('email')?.hasError('email')">Ingresá un email válido</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Contraseña</mat-label>
    <input matInput [type]="ocultarClave ? 'password' : 'text'" formControlName="clave" placeholder="Tu contraseña" />
    <button mat-icon-button matSuffix type="button" (click)="ocultarClave = !ocultarClave">
      <mat-icon>{{ ocultarClave ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
    <mat-error *ngIf="form.get('clave')?.hasError('required')">La contraseña es obligatoria</mat-error>
    <mat-error *ngIf="form.get('clave')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
  </mat-form-field>

  <div *ngIf="error" class="error-message">{{ error }}</div>

  <div class="form-actions">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="cargando">
      {{ cargando ? 'Ingresando...' : 'Ingresar' }}
    </button>
  </div>

  <div class="form-question">
    <button mat-button type="button" (click)="irARegistro()">¿No tenés cuenta? Registrate</button>
  </div>
</form>
