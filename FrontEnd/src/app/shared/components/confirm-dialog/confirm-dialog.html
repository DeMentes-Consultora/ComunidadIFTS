<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancelar()">
    {{ data.cancelText || 'Cancelar' }}
  </button>
  <button mat-flat-button color="warn" type="button" (click)="confirmar()">
    {{ data.confirmText || 'Eliminar' }}
  </button>
</mat-dialog-actions>
